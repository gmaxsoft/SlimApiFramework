name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Konfiguracja PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Walidacja composer.json
        run: composer validate --strict

      - name: Instalacja zależności
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Generowanie specyfikacji OpenAPI
        run: composer openapi:generate

      - name: Sprawdzenie składni PHP
        run: |
          set -e
          for dir in bootstrap config public scripts src; do
            if [ -d "$dir" ]; then
              find "$dir" -name '*.php' -print0 | while IFS= read -r -d '' f; do
                php -l "$f"
              done
            fi
          done
